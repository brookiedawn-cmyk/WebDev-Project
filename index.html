<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game - Skins & Walls</title>

<style>
body {
    margin: 0;
    background: #0b0f14;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

h1 {
    color: #7CFC00;
}

canvas {
    background: #111827;
    border: 3px solid #7CFC00;
}

#score {
    margin-top: 10px;
    font-size: 18px;
}

.controls {
    margin-top: 10px;
}

button {
    padding: 8px 12px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>

<canvas id="game" width="400" height="400"></canvas>

<div id="score">Score: 0</div>

<div class="controls">
    <button onclick="setSkin('green')">Green</button>
    <button onclick="setSkin('blue')">Blue</button>
    <button onclick="setSkin('purple')">Purple</button>
    <button onclick="setSkin('orange')">Orange</button>
    <button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;

let snakeColor = "#7CFC00";

let snake = {};
let apple = {};
let score = 0;

let count = 0;
let speed = 6;

// ---------- INIT ----------
function init() {
    snake = {
        x: 160,
        y: 160,
        dx: grid,
        dy: 0,
        cells: [],
        maxCells: 4
    };

    apple = {
        x: randomGrid(),
        y: randomGrid()
    };

    score = 0;
    speed = 6;

    document.getElementById("score").innerText = "Score: 0";
}

function randomGrid() {
    return Math.floor(Math.random() * 20) * grid;
}

// ---------- GAME LOOP ----------
function loop() {
    requestAnimationFrame(loop);

    if (++count < speed) return;
    count = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // move snake
    snake.x += snake.dx;
    snake.y += snake.dy;

    // 🧱 WALLS KILL
    if (
        snake.x < 0 ||
        snake.x >= canvas.width ||
        snake.y < 0 ||
        snake.y >= canvas.height
    ) {
        resetGame();
        return;
    }

    snake.cells.unshift({ x: snake.x, y: snake.y });

    if (snake.cells.length > snake.maxCells) {
        snake.cells.pop();
    }

    // draw apple
    ctx.fillStyle = "red";
    ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

    // draw snake
    ctx.fillStyle = snakeColor;

    snake.cells.forEach((cell, index) => {

        ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        // eat apple
        if (cell.x === apple.x && cell.y === apple.y) {
            snake.maxCells++;
            score += 1; // 🔢 1 POINT ONLY

            document.getElementById("score").innerText = "Score: " + score;

            apple.x = randomGrid();
            apple.y = randomGrid();

            // speed up slightly
            if (speed > 2) speed -= 0.15;
        }

        // collision with self
        for (let i = index + 1; i < snake.cells.length; i++) {
            if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                resetGame();
            }
        }
    });
}

// ---------- CONTROLS ----------
document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft" && snake.dx === 0) {
        snake.dx = -grid;
        snake.dy = 0;
    }
    else if (e.key === "ArrowUp" && snake.dy === 0) {
        snake.dx = 0;
        snake.dy = -grid;
    }
    else if (e.key === "ArrowRight" && snake.dx === 0) {
        snake.dx = grid;
        snake.dy = 0;
    }
    else if (e.key === "ArrowDown" && snake.dy === 0) {
        snake.dx = 0;
        snake.dy = grid;
    }
});

// ---------- SKINS ----------
function setSkin(color) {
    if (color === "green") snakeColor = "#7CFC00";
    if (color === "blue") snakeColor = "#00bfff";
    if (color === "purple") snakeColor = "#b266ff";
    if (color === "orange") snakeColor = "#ff8c00";
}

// ---------- RESET ----------
function resetGame() {
    init();
}

// ---------- START ----------
init();
requestAnimationFrame(loop);
</script>

</body>
</html>
